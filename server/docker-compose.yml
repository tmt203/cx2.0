services:
  tenant-config-service:
    build:
      context: .
      dockerfile: services/tenant-config-service/Dockerfile
    container_name: cx2.0-tenant-config-service
    ports:
      - "${TENANT_CONFIG_SERVICE_PORT:-4004}:4004"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TENANT_CONFIG_SERVICE_PORT: ${TENANT_CONFIG_SERVICE_PORT:-4004}
      MONGO_URL: ${MONGO_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cx2.0-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4004/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:

networks:
  cx2.0-network:
    driver: bridge
